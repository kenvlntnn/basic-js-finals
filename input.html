<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Username Password Input</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-box {
            background: #34495e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 320px;
        }

        h2 { text-align: center; margin-bottom: 25px; }

        .field { margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 8px; font-size: 0.9em; }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: none;
            box-sizing: border-box;
        }

        #submitBtn {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        #submitBtn:hover {
            background-color: #2ecc71;
        }

        #errorMsg {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: 15px;
            display: none;
            line-height: 1.4;
        }

        .home-link {
            margin-top: 30px;
            text-decoration: none;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Secure Access</h2>
        
        <div class="field">
            <label for="user">Username</label>
            <input type="text" id="user" placeholder="Enter username">
        </div>

        <div class="field">
            <label for="pass">Password</label>
            <input type="password" id="pass" placeholder="Enter password">
        </div>

        <button id="submitBtn">Submit Credentials</button>

        <!-- Error message section -->
        <p id="errorMsg">
            Error: Password must be at least 8 characters long and contain both uppercase and lowercase letters.
        </p>
    </div>

    <a href="index.html" class="home-link">← Back to Main Page</a>

    <script>
        const userInp = document.getElementById('user');
        const passInp = document.getElementById('pass');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');

        submitBtn.onclick = () => {
            const username = userInp.value;
            const password = passInp.value;

            // Password Requirements: 
            // 1. 8 characters long
            // 2. Both lowercase and uppercase letters
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const isLongEnough = password.length >= 8;

            if (hasUpper && hasLower && isLongEnough) {
                // Success: Hide error and log to console
                errorMsg.style.display = 'none';
                
                console.log("--- Login Data Submitted ---");
                console.log("Username: " + username);
                console.log("Password: " + password);
                
                alert("Submission successful! Check the console (F12) for the data.");
            } else {
                // Failure: Show error
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>
</html>
